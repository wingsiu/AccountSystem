version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: accountsystem-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-change_this_root_password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-accountsystem}
      MYSQL_USER: ${MYSQL_USER:-accountuser}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-change_this_app_password}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init:/docker-entrypoint-initdb.d
    networks:
      - accountsystem

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: accountsystem-phpmyadmin
    environment:
      PMA_HOST: ${PMA_HOST:-mysql}
      PMA_USER: ${PMA_USER:-${MYSQL_USER:-accountuser}}
      PMA_PASSWORD: ${PMA_PASSWORD:-${MYSQL_PASSWORD:-change_this_app_password}}
    ports:
      - "8080:80"
    depends_on:
      - mysql
    networks:
      - accountsystem

volumes:
  mysql_data:

networks:
  accountsystem:
    driver: bridge
